# Render service configuration
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: terabox-downloader-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install --omit=dev
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: terabox-downloader-api
          envVarKey: PORT
      - key: ALLOWED_ORIGINS
        sync: false   # Set this manually in Render dashboard to your Vercel frontend URL
